<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050505">
<title>Jose Arias — Tech Management</title>
<style>
  :root{
    --ink:#f2ede2;
    --ink-dim:rgba(242,237,226,0.62);
    --gold:#c9a961;
    --gold-soft:rgba(201,169,97,0.55);
    --glass-bg:rgba(20,20,18,0.32);
    --glass-border:rgba(242,237,226,0.16);
    --glass-hi:rgba(255,255,255,0.09);
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-l:env(safe-area-inset-left,0px);
    --safe-r:env(safe-area-inset-right,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;width:100%;
    background:#050505;
    overflow:hidden;
    overscroll-behavior:none;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  }
  .stage{
    position:relative;
    height:100dvh;
    width:100vw;
    overflow:hidden;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }
  .photo-wrap{
    position:absolute;
    inset:0;
    overflow:hidden;
    opacity:0;
    animation:stagefade .9s ease-out forwards;
  }
  .photo-wrap img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 18%;
    transform-origin:center 30%;
    animation:kenburns 22s ease-in-out infinite alternate, driftimg 9s ease-in-out infinite;
    will-change:transform;
  }
  @keyframes stagefade{ to{opacity:1;} }
  @keyframes kenburns{
    0%{ transform:scale(1) translate3d(0,0,0); }
    100%{ transform:scale(1.022) translate3d(0,-0.4%,0); }
  }
  @keyframes driftimg{
    0%,100%{ margin-left:0px; }
    50%{ margin-left:0px; }
  }
  .scrim{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(3,3,3,0.15) 0%, rgba(3,3,3,0.12) 30%, rgba(3,3,3,0.55) 68%, rgba(2,2,2,0.92) 100%),
      radial-gradient(120% 90% at 50% 8%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.35) 100%);
    pointer-events:none;
  }
  .grain{
    position:absolute; inset:0;
    pointer-events:none;
    opacity:0.5;
    mix-blend-mode:overlay;
    background-image:radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size:3px 3px;
  }
  .particles{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .particle{
    position:absolute;
    bottom:-10px;
    width:3px;height:3px;
    border-radius:50%;
    background:rgba(242,237,226,0.55);
    filter:blur(0.3px);
    animation:floatup linear infinite;
    opacity:0;
  }
  @keyframes floatup{
    0%{ transform:translate3d(0,0,0); opacity:0; }
    8%{ opacity:0.6; }
    92%{ opacity:0.35; }
    100%{ transform:translate3d(var(--dx,10px),-108vh,0); opacity:0; }
  }
  .content{
    position:relative;
    z-index:2;
    width:100%;
    display:flex;
    justify-content:center;
    padding:0 18px calc(22px + var(--safe-b)) 18px;
    perspective:1200px;
  }
  .panel{
    width:100%;
    max-width:400px;
    border-radius:28px;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    box-shadow:0 24px 70px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.14);
    padding:22px 20px calc(18px + var(--safe-b)*0.3);
    position:relative;
    overflow:hidden;
    opacity:0;
    transform:translateY(22px);
    animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .25s forwards;
  }
  .panel-tilt{
    width:100%;
    max-width:400px;
    position:relative;
    transform-style:preserve-3d;
    will-change:transform;
    transition:box-shadow .2s ease;
    box-shadow:var(--shx,0px) var(--shy,20px) 46px rgba(0,0,0,0.4);
    border-radius:28px;
  }
  .glass-glow{
    position:absolute;
    inset:0;
    z-index:3;
    pointer-events:none;
    border-radius:inherit;
    background:radial-gradient(220px 220px at var(--lx,50%) var(--ly,10%), rgba(255,255,255,0.18), rgba(255,255,255,0) 60%);
    mix-blend-mode:overlay;
  }
  .scanline{
    position:absolute;
    left:0; right:0;
    height:44%;
    top:-44%;
    z-index:3;
    pointer-events:none;
    background:linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.11) 50%, rgba(255,255,255,0) 100%);
    mix-blend-mode:overlay;
    animation:scandown 7.5s ease-in-out infinite;
  }
  @keyframes scandown{
    0%{ top:-44%; }
    42%{ top:106%; }
    100%{ top:106%; }
  }
  .reticle-corner{
    position:absolute;
    width:15px;height:15px;
    border-color:var(--gold);
    opacity:0.55;
    pointer-events:none;
    animation:reticleBreathe 3.6s ease-in-out infinite;
    filter:drop-shadow(0 0 4px rgba(201,169,97,0.4));
  }
  .reticle-corner.tl{ top:-7px; left:-7px; border-top:1.4px solid; border-left:1.4px solid; border-radius:4px 0 0 0; animation-delay:0s; }
  .reticle-corner.tr{ top:-7px; right:-7px; border-top:1.4px solid; border-right:1.4px solid; border-radius:0 4px 0 0; animation-delay:.3s; }
  .reticle-corner.bl{ bottom:-7px; left:-7px; border-bottom:1.4px solid; border-left:1.4px solid; border-radius:0 0 0 4px; animation-delay:.6s; }
  .reticle-corner.br{ bottom:-7px; right:-7px; border-bottom:1.4px solid; border-right:1.4px solid; border-radius:0 0 4px 0; animation-delay:.9s; }
  @keyframes reticleBreathe{
    0%,100%{ opacity:0.38; transform:scale(0.94); }
    50%{ opacity:0.9; transform:scale(1.05); }
  }
  .sheen{
    position:absolute;
    top:0; left:-60%;
    width:40%; height:100%;
    background:linear-gradient(100deg, transparent, rgba(255,255,255,0.16), transparent);
    transform:skewX(-18deg);
    animation:sheenmove 6.5s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes sheenmove{
    0%{ left:-60%; }
    35%{ left:130%; }
    100%{ left:130%; }
  }
  .identity{
    text-align:center;
    opacity:0;
    transform:translateY(18px);
    animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .55s forwards;
    margin-bottom:18px;
  }
  .identity h1{
    margin:0;
    font-size:26px;
    font-weight:600;
    letter-spacing:0.01em;
    color:var(--ink);
    text-shadow:0 0 18px rgba(242,237,226,0.25), 0 1px 0 rgba(0,0,0,0.3);
  }
  .hairline{
    width:34px;height:1px;
    margin:9px auto;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:0.9;
  }
  .identity p{
    margin:0;
    font-size:11.5px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:500;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    opacity:0;
    transform:translateY(18px);
    animation:fadeUp .6s cubic-bezier(.22,1,.36,1) .82s forwards;
  }
  .signature{
    text-align:center;
    margin-top:16px;
    opacity:0;
    transform:translateY(14px);
    animation:fadeUp .6s cubic-bezier(.22,1,.36,1) 1.05s forwards;
  }
  .signature span{
    font-size:10.5px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:500;
    text-shadow:0 0 14px rgba(201,169,97,0.35);
  }
  @keyframes fadeUp{
    to{ opacity:1; transform:translateY(0); }
  }
  .btn{
    appearance:none;
    border:none;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:12px 4px 10px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    color:var(--ink);
    cursor:pointer;
    -webkit-user-select:none;user-select:none;
    animation:hover-float 5s ease-in-out infinite;
    transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
    will-change:transform;
  }
  .btn:nth-child(1){ animation-delay:0s; }
  .btn:nth-child(2){ animation-delay:.6s; }
  .btn:nth-child(3){ animation-delay:1.2s; }
  .btn:nth-child(4){ animation-delay:.3s; }
  .btn:nth-child(5){ animation-delay:.9s; }
  .btn:nth-child(6){ animation-delay:1.5s; }
  @keyframes hover-float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-3px); }
  }
  .btn .ic{
    width:20px;height:20px;
    stroke:var(--ink);
    fill:none;
    stroke-width:1.6;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .btn span{
    font-size:9.5px;
    letter-spacing:0.03em;
    color:var(--ink-dim);
    font-weight:500;
  }
  .btn.tap{
    animation:none !important;
    transform:scale(1.12) translateY(-3px) !important;
    box-shadow:0 0 0 1px var(--gold-soft), 0 8px 24px rgba(201,169,97,0.35);
    background:rgba(255,255,255,0.09);
  }
  @media (orientation:landscape){
    .content{ padding-bottom:calc(10px + var(--safe-b)); }
    .panel-tilt{ max-width:520px; }
    .panel{ max-width:520px; padding:14px 22px 14px; }
    .identity{ margin-bottom:10px; }
    .identity h1{ font-size:20px; }
    .grid{ gap:10px; }
    .btn{ padding:8px 4px 7px; border-radius:14px; }
  }
  @media (prefers-reduced-motion: reduce){
    .photo-wrap img, .sheen, .btn, .particle{ animation:none !important; }
    .reticle-corner, .scanline{ animation:none !important; }
    .panel-tilt{ transform:none !important; }
  }
</style>
</head>

(function(){

  var tx = 0, ty = 0, cx = 0, cy = 0;
  var maxTiltX = 7, maxTiltY = 10;
  var tTiltX = 0, tTiltY = 0, cTiltX = 0, cTiltY = 0;
  var reduceMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  var rafId = null;

  function apply(){
    cx += (tx - cx) * 0.08;
    cy += (ty - cy) * 0.08;
    photoWrap.style.transform = 'translate3d(' + cx.toFixed(2) + 'px,' + cy.toFixed(2) + 'px,0) scale(1.03)';

    if(panelTilt && !reduceMotion){
      cTiltX += (tTiltX - cTiltX) * 0.08;
      cTiltY += (tTiltY - cTiltY) * 0.08;
      panelTilt.style.transform = 'rotateX(' + cTiltX.toFixed(2) + 'deg) rotateY(' + cTiltY.toFixed(2) + 'deg)';
      panelTilt.style.setProperty('--lx', (50 + (cTiltY / maxTiltY) * 46).toFixed(1) + '%');
      panelTilt.style.setProperty('--ly', (16 - (cTiltX / maxTiltX) * 26).toFixed(1) + '%');
      panelTilt.style.setProperty('--shx', (-cTiltY * 2.2).toFixed(1) + 'px');
      panelTilt.style.setProperty('--shy', (22 - cTiltX * 1.6).toFixed(1) + 'px');
    }
    rafId = requestAnimationFrame(apply);
  }
  rafId = requestAnimationFrame(apply);

  function fromPoint(x, y){
    var w = window.innerWidth, h = window.innerHeight;
    var nx = (x / w) - 0.5;
    var ny = (y / h) - 0.5;
    tx = -nx * maxShift;
    ty = -ny * maxShift * 0.6;
    tTiltY = nx * maxTiltY;
    tTiltX = -ny * maxTiltX;
  }

  window.addEventListener('touchmove', function(e){
    if(e.touches && e.touches[0]){
      fromPoint(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, {passive:true});

  window.addEventListener('mousemove', function(e){
    fromPoint(e.clientX, e.clientY);
  }, {passive:true});

  if(window.DeviceOrientationEvent){
    window.addEventListener('deviceorientation', function(e){
      if(e.gamma === null || e.beta === null) return;
      var g = Math.max(-20, Math.min(20, e.gamma));
      var b = Math.max(-10, Math.min(30, e.beta - 40));
      tx = -(g / 20) * maxShift;
      ty = -(b / 30) * maxShift * 0.6;
      tTiltY = (g / 20) * maxTiltY;
      tTiltX = -(b / 30) * maxTiltX;
    }, {passive:true});

      el.classList.add('tap');
      setTimeout(function(){ el.classList.remove('tap'); }, 260);
    }, {passive:true});
  });

  var field = document.getElementById('particles');
  var n = 10;
  for(var i=0;i<n;i++){
    var p = document.createElement('div');
    p.className = 'particle';
    var left = Math.random()*100;
    var dur = 10 + Math.random()*9;
    var delay = Math.random()*10;
    var dx = (Math.random()*30 - 15).toFixed(0) + 'px';
    var size = (1.5 + Math.random()*2).toFixed(1) + 'px';
    p.style.left = left + '%';
    p.style.width = size;
    p.style.height = size;
    p.style.animationDuration = dur + 's';
    p.style.animationDelay = '-' + delay + 's';
    p.style.setProperty('--dx', dx);
    field.appendChild(p);
  }
})();
